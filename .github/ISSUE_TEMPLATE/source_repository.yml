name: Source repository request
description: Suggest a new GitHub repository that posts jobs via issues
title: "[source]: "
labels: ["source-request"]
body:
  - type: input
    id: repository
    attributes:
      label: Repository URL
      placeholder: https://github.com/org/repo
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: Region
      options:
        - Brazil
        - Portugal
        - Angola
        - LATAM
        - Europe
        - Global
        - Other
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Primary language
      placeholder: Portuguese
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link one or more issues that are clearly job postings
      placeholder: |
        - https://github.com/org/repo/issues/123
        - https://github.com/org/repo/issues/124
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Any context that helps triage this source
